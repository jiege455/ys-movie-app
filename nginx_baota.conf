# 宝塔面板Nginx配置文件
# 将此内容复制到宝塔面板网站设置 -> 配置文件中

server {
    listen 80;
    server_name movie.yourdomain.com;  # 替换为你的域名
    
    # 网站根目录 - 替换为你的实际路径
    root /www/wwwroot/movie/dist;
    index index.html index.htm;
    
    # 强制HTTPS（可选，需要先配置SSL证书）
    # return 301 https://$server_name$request_uri;
    
    # 前端路由支持 - 重要！确保React Router正常工作
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # API代理配置（可选）
    # 如果需要在服务器端代理API请求，取消下面的注释
    # location /api/ {
    #     proxy_pass https://api.themoviedb.org/3/;
    #     proxy_set_header Host api.themoviedb.org;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     
    #     # 添加你的API key到请求头
    #     proxy_set_header Authorization "Bearer YOUR_API_KEY";
    # }
    
    # 视频文件代理（可选）
    # location /video/ {
    #     proxy_pass http://your-video-server.com/;
    #     proxy_set_header Host your-video-server.com;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    
    # 安全头设置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 隐藏Nginx版本
    server_tokens off;
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # 错误页面
    error_page 404 /index.html;
    
    # 访问日志
    access_log /www/wwwlogs/movie_access.log;
    error_log /www/wwwlogs/movie_error.log;
}

